# power-manage docs — production deploy behind Traefik.
#
# Designed to drop in next to the power-manage server stack: shares
# its Traefik (`letsencrypt` cert resolver, `websecure` entrypoint),
# but lives on its OWN network so the docs container can't reach
# postgres / valkey / control / gateway and they can't reach back.
# Clean separation; only Traefik bridges the two stacks.
#
# One-time setup on the deploy host:
#
#   # 1. Clone the repo
#   git clone https://github.com/manchtools/power-manage-docs.git
#   cd power-manage-docs
#
#   # 2. Bring up the docs container (creates the
#   #    `power-manage-docs` network as a side-effect).
#   docker compose -f compose.prod.yml up -d
#
#   # 3. Wire Traefik into the docs network so it can route to us.
#   #    One-time — the connection persists across `docs` restarts.
#   docker network connect power-manage-docs pm-traefik
#
# If you later recreate the Traefik container (rare), re-run step 3,
# OR add `power-manage-docs` to the traefik service's networks list
# in server/deploy/compose.yml + declare it as external there for a
# durable wiring.
#
# Updating content: `git pull && docker compose -f compose.prod.yml \
#   up -d --force-recreate`.

services:
  docs:
    image: ghcr.io/manchtools/open-docs:latest
    container_name: power-manage-docs
    restart: unless-stopped
    volumes:
      - ./content:/content:ro
      - ./static:/static:ro
    environment:
      # Site chrome — baked in at container start. Edit and
      # `up -d --force-recreate` to republish.
      PUBLIC_BRAND_NAME: "power-manage"
      PUBLIC_BRAND_TAGLINE: "docs"
      PUBLIC_SITE_TITLE: "power-manage · Documentation"
      PUBLIC_SITE_DESCRIPTION: "power-manage is an open-source platform for managing Linux endpoints. mTLS-authenticated agents, an event-sourced audit log, OIDC and SCIM provisioning, and twenty-three idempotent action types."
      PUBLIC_SITE_URL: "https://power-manage.docs.manchtools.com"
      PUBLIC_REPO_URL: "https://github.com/manchtools/power-manage-docs"

      # {{WEB_UI_URL}} in markdown → this hostname at build time.
      PUBLIC_TOKEN_WEB_UI_URL: "https://app.power-manage.manchtools.com"
    labels:
      - "traefik.enable=true"
      # Tell Traefik which network to use to reach this container.
      # Traefik is multi-homed (pm-internal + power-manage-docs);
      # pinning the network prevents accidental routing via the wrong
      # interface if the topology changes later.
      - "traefik.docker.network=power-manage-docs"
      # Router: HTTPS-only on the websecure entrypoint, Let's
      # Encrypt cert via the resolver the server stack already
      # provisions.
      - "traefik.http.routers.docs.rule=Host(`power-manage.docs.manchtools.com`)"
      - "traefik.http.routers.docs.entrypoints=websecure"
      - "traefik.http.routers.docs.tls.certresolver=letsencrypt"
      # Mirror the X-Forwarded-Proto middleware control uses so the
      # bun adapter knows requests originated over HTTPS when it
      # generates absolute URLs.
      - "traefik.http.routers.docs.middlewares=docs-headers"
      - "traefik.http.middlewares.docs-headers.headers.customrequestheaders.X-Forwarded-Proto=https"
      - "traefik.http.services.docs.loadbalancer.server.port=3000"
    networks:
      - docs

networks:
  # Compose creates and owns this network. `name:` forces a stable
  # name (no `<project>_` prefix), so `docker network connect
  # power-manage-docs pm-traefik` works without guesswork.
  #
  # Power-manage server stack lives on `pm-internal` and is NOT
  # attached here, so docs can't reach postgres / valkey / control /
  # gateway. Only Traefik (multi-homed) bridges the boundary.
  docs:
    name: power-manage-docs
    driver: bridge
