name: CI

# Smoke-test: spin up open-docs:latest against this repo's content
# and assert the build succeeds. The repo carries no engine of its
# own; broken Markdoc tags, dead {{TOKENS}}, or unresolved links
# fail the run.
on:
  pull_request:
    paths:
      - 'content/**'
      - 'static/**'
      - 'compose.yml'
      - '.github/workflows/ci.yml'
  push:
    branches:
      - main

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  render-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build content with open-docs:latest
        run: |
          docker run --rm \
            -v "${PWD}/content:/content:ro" \
            -v "${PWD}/static:/static:ro" \
            -e PUBLIC_BRAND_NAME="power-manage" \
            -e PUBLIC_BRAND_TAGLINE="docs" \
            -e PUBLIC_SITE_TITLE="power-manage · Documentation" \
            -e PUBLIC_REPO_URL="https://github.com/manchtools/power-manage-docs" \
            -e PUBLIC_TOKEN_WEB_UI_URL="https://app.power-manage.manchtools.com" \
            --entrypoint /bin/sh \
            ghcr.io/manchtools/open-docs:latest \
            -c 'cp -r /content/. /app/src/content/ && \
                cp -r /static/. /app/static/ 2>/dev/null || true && \
                cd /app && bun run build'
