name: CI

# Match web/'s CI shape: PR + main pushes trigger test/check; only
# release tags trigger the image build + push.
on:
  pull_request:
    paths:
      - 'src/**'
      - 'static/**'
      - 'package.json'
      - 'bun.lock'
      - 'svelte.config.js'
      - 'vite.config.ts'
      - 'tsconfig.json'
      - 'markdoc.config.ts'
      - '.github/workflows/ci.yml'
  push:
    branches:
      - main
    tags:
      - 'v*'

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --no-frozen-lockfile
      - run: bun run check
      - run: bun run build
      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: docs-build
          path: build/
          retention-days: 7

  build:
    # Image-push only on tag pushes (release). PR + main runs only
    # need check (svelte-check + vite build).
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    needs: check
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/power-manage-docs:${{ github.ref_name }}
            ghcr.io/${{ github.repository_owner }}/power-manage-docs:latest
          build-args: VERSION=${{ github.ref_name }}
          provenance: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
