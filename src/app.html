<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta name="description" content="power-manage — Linux device management documentation" />

		<!-- Favicons. SVG is preferred by modern browsers (vector, scales for retina);
		     PNG fallbacks cover Safari + legacy. apple-touch-icon is iOS home-screen. -->
		<link rel="icon" href="%sveltekit.assets%/favicon.svg" type="image/svg+xml" />
		<link rel="icon" href="%sveltekit.assets%/favicon-32.png" type="image/png" sizes="32x32" />
		<link rel="icon" href="%sveltekit.assets%/favicon-16.png" type="image/png" sizes="16x16" />
		<link rel="apple-touch-icon" href="%sveltekit.assets%/apple-touch-icon.png" />

		<!-- Open Graph / social cards -->
		<meta property="og:title" content="power-manage — Documentation" />
		<meta property="og:description" content="Linux fleet management — declarative, audit-first, open source." />
		<meta property="og:image" content="%sveltekit.assets%/icon-512.png" />
		<meta property="og:type" content="website" />
		<meta name="twitter:card" content="summary" />
		<meta name="twitter:image" content="%sveltekit.assets%/icon-512.png" />

		<meta name="theme-color" content="#6366F1" />

		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover" class="bg-background text-foreground">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
